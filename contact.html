<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | MatrimonyHUB</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
     <link rel= "stylesheet" href="assets/css/style.css">

</head>

<body>

    <nav class="navbar">
        <div class="logo">MatrimonyHUB</div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="profile/login.html">Login</a>
        </div>
    </nav>

    <section class="contact-section">

        <div class="contact-info">
            <h2>Contact Us</h2>

            <p>
                Have questions or need support? Feel free to contact our support team anytime.
            </p>

            <div class="contact-item">
                <i class="fa-solid fa-envelope"></i>
                <span>support@matrimonyhub.com</span>
            </div>

            <div class="contact-item">
                <i class="fa-solid fa-phone"></i>
                <span>+880 1234-567890</span>
            </div>

            <div class="contact-item">
                <i class="fa-solid fa-location-dot"></i>
                <span>Dhaka, Bangladesh</span>
            </div>
        </div>

        <div class="contact-form">
            <h2>Send Message</h2>

            <form id="contactForm">

                <div class="input-group">
                    <input type="text" id="name" placeholder="Your Name" required>
                </div>

                <div class="input-group">
                    <input type="email" id="email" placeholder="Your Email" required>
                </div>

                <div class="input-group">
                    <textarea id="message" placeholder="Write Your Message" required></textarea>
                </div>

                <button type="submit" class="btn">
                    Send Message
                </button>

            </form>
        </div>

    </section>

    <footer class="footer">
        <p>© 2026 MatrimonyHUB. All Rights Reserved.</p>
    </footer>

    <script>

        const contactForm = document.getElementById('contactForm');

        contactForm.addEventListener('submit', function (e) {

            e.preventDefault();

            const name = document.getElementById('name').value;

            alert(`Thank you ${name}! Your message has been sent successfully.`);

            contactForm.reset();
        });

    </script>

</body>

</html>
