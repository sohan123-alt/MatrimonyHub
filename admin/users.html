<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management - MatriHub Admin</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-shield-alt logo-icon"></i>
                <span>Admin</span>
            </div>
            <button class="sidebar-toggle-mobile" id="sidebar-toggle-mobile">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a href="admin.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="users.html" class="nav-item active">
                <i class="fas fa-users"></i>
                <span>Users</span>
            </a>
            <a href="interests.html" class="nav-item">
                <i class="fas fa-heart"></i>
                <span>Interests</span>
            </a>
            <a href="images.html" class="nav-item">
                <i class="fas fa-images"></i>
                <span>Images</span>
            </a>
            <a href="analytics.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>Analytics</span>
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-file-pdf"></i>
                <span>Reports</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" id="sidebar-toggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="breadcrumb">Users Management</div>
        </div>

        <div class="topbar-right">
            <button class="btn-icon" id="export-btn" title="Export Users">
                <i class="fas fa-download"></i>
            </button>
            <div class="profile-dropdown">
                <button class="profile-toggle" id="profile-toggle">
                    <img src="https://via.placeholder.com/40" alt="Admin" class="avatar">
                    <span id="admin-name">Admin</span>
                    <i class="fas fa-chevron-down" style="font-size: 12px;"></i>
                </button>
                <div class="dropdown-menu" id="profile-menu">
                    <button class="dropdown-item" onclick="logoutAdmin()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <div class="content-wrapper">
            <!-- Alerts -->
            <div id="alerts-container"></div>

            <!-- Page Header -->
            <div class="page-header">
                <h1>User Management</h1>
                <div class="page-controls">
                    <input type="text" id="search-input" placeholder="Search users..." class="form-control"
                        style="width: 300px; padding: 8px 12px; background: var(--dark-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary);">
                    <button class="btn btn-outline" onclick="resetFilters()">Reset Filters</button>
                </div>
            </div>

            <!-- Filters -->
            <div class="filter-section"
                style="background: var(--card-bg); padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid var(--border-color);">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Gender</label>
                        <select id="filter-gender" class="form-control"
                            style="padding: 8px 12px; background: var(--dark-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary);">
                            <option value="">All Genders</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Religion</label>
                        <select id="filter-religion" class="form-control"
                            style="padding: 8px 12px; background: var(--dark-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary);">
                            <option value="">All Religions</option>
                            <option value="Islam">Islam</option>
                            <option value="Hinduism">Hinduism</option>
                            <option value="Buddhism">Buddhism</option>
                            <option value="Christianity">Christianity</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Status</label>
                        <select id="filter-status" class="form-control"
                            style="padding: 8px 12px; background: var(--dark-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary);">
                            <option value="">All Status</option>
                            <option value="verified">Verified</option>
                            <option value="blocked">Blocked</option>
                            <option value="unverified">Unverified</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Age Range</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="number" id="filter-age-min" placeholder="Min" class="form-control"
                                style="flex: 1; padding: 8px 12px; background: var(--dark-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary);">
                            <input type="number" id="filter-age-max" placeholder="Max" class="form-control"
                                style="flex: 1; padding: 8px 12px; background: var(--dark-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary);">
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="applyFilters()" style="margin-top: 15px; width: 100%;">Apply
                    Filters</button>
            </div>

            <!-- Users Table -->
            <div class="recent-activities">
                <div class="section-header">
                    <h2>All Users</h2>
                    <div>
                        <span style="color: var(--text-muted);">Total: <strong id="total-users">0</strong></span>
                    </div>
                </div>

                <div class="activity-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Age</th>
                                <th>Gender</th>
                                <th>Religion</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <tr>
                                <td colspan="8" style="text-align: center; padding: 40px;">
                                    <i class="fas fa-hourglass-end"
                                        style="font-size: 2rem; color: var(--text-muted);"></i>
                                    <p style="margin-top: 10px;">Loading users...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div
                    style="display: flex; justify-content: center; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                    <button class="btn btn-outline btn-sm" id="prev-btn" onclick="previousPage()"
                        style="display: none;">← Previous</button>
                    <div id="page-info" style="padding: 8px 16px; color: var(--text-muted);">Page 1</div>
                    <button class="btn btn-outline btn-sm" id="next-btn" onclick="nextPage()"
                        style="display: none;">Next →</button>
                </div>
            </div>
        </div>
    </div>

    <!-- User Details Modal -->
    <div class="modal-overlay" id="user-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>User Details</h3>
                <button class="modal-close" onclick="closeUserModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="user-details-content">
                <!-- User details will be loaded here -->
            </div>
            <div class="modal-footer"
                style="padding: 20px; border-top: 1px solid var(--border-color); display: flex; gap: 10px;">
                <button class="btn btn-outline" onclick="closeUserModal()">Close</button>
                <button class="btn btn-primary" id="action-btn">Take Action</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config/supabase.js"></script>
    <script src="../assets/js/api/admin.js"></script>
    <script src="../assets/js/admin/user.js"></script>
    <script src="../assets/js/utils/helpers.js"></script>
    <script src="../assets/js/admin/users.js"></script>
</body>

</html>
