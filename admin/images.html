<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Management - Admin Dashboard</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/feather-icons@4.29.0/dist/feather.min.js"></script>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">💎</span>
                <span class="logo-text">MatriAdmin</span>
            </div>
            <button class="sidebar-toggle-mobile" id="sidebarToggleMobile">
                <i data-feather="menu"></i>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a href="admin.html" class="nav-item" data-page="dashboard">
                <i data-feather="home"></i>
                <span>Dashboard</span>
            </a>
            <a href="users.html" class="nav-item" data-page="users">
                <i data-feather="users"></i>
                <span>Users</span>
                <span class="badge" id="usersCount">0</span>
            </a>
            <a href="interests.html" class="nav-item" data-page="interests">
                <i data-feather="heart"></i>
                <span>Interests</span>
            </a>
            <a href="reports.html" class="nav-item" data-page="reports">
                <i data-feather="alert-circle"></i>
                <span>Reports</span>
                <span class="badge danger" id="reportsCount">0</span>
            </a>
            <a href="images.html" class="nav-item active" data-page="images">
                <i data-feather="image"></i>
                <span>Images</span>
            </a>
            <a href="analytics.html" class="nav-item" data-page="analytics">
                <i data-feather="bar-chart-2"></i>
                <span>Analytics</span>
            </a>
            <a href="settings.html" class="nav-item" data-page="settings">
                <i data-feather="settings"></i>
                <span>Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="logoutBtn">
                <i data-feather="log-out"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Top Navbar -->
        <nav class="topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i data-feather="menu"></i>
                </button>
                <div class="breadcrumb">
                    <span id="breadcrumbText">Image Management</span>
                </div>
            </div>

            <div class="topbar-right">
                <div class="notification-container">
                    <button class="btn-icon notification-btn" id="notificationBtn">
                        <i data-feather="bell"></i>
                        <span class="notification-badge" id="notificationCount">0</span>
                    </button>
                </div>
                <button class="btn-icon" id="themeToggle">
                    <i data-feather="moon"></i>
                </button>
                <div class="admin-profile">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=admin" alt="Admin Avatar" class="avatar">
                </div>
            </div>
        </nav>

        <div class="content-wrapper">
            <!-- Page Header -->
            <section class="page-header">
                <div>
                    <h1>Image Management</h1>
                    <p>Review and moderate user profile images</p>
                </div>
            </section>

            <!-- Stats -->
            <section class="stats-grid stats-compact">
                <div class="stat-card compact">
                    <div class="stat-icon" style="--color: #3b82f6;">
                        <i data-feather="image"></i>
                    </div>
                    <div class="stat-content">
                        <p class="stat-label">Total Images</p>
                        <h3 class="stat-value" id="totalImages">0</h3>
                    </div>
                </div>
            </section>

            <!-- Image Grid -->
            <section class="table-section">
                <div class="table-header">
                    <h2>Profile Images</h2>
                </div>

                <div id="imagesGrid" class="images-grid">
                    <!-- Images loaded here -->
                </div>
            </section>
        </div>
    </main>

    <!-- Image Preview Modal -->
    <div class="modal" id="imageModal">
        <div class="modal-content modal-lg" style="max-width: 600px;">
            <div class="modal-header">
                <h2>Image Preview</h2>
                <button class="modal-close" id="closeImageModal">&times;</button>
            </div>
            <div class="modal-body" style="text-align: center;">
                <img id="previewImage" src="" alt="Preview"
                    style="max-width: 100%; max-height: 400px; border-radius: 10px;">
                <div style="margin-top: 1rem; text-align: left;">
                    <p><strong>User:</strong> <span id="imageUser">-</span></p>
                    <p><strong>Email:</strong> <span id="imageEmail">-</span></p>
                    <p><strong>Uploaded:</strong> <span id="imageDate">-</span></p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="closeImageBtn">Close</button>
                <button class="btn btn-danger" id="deleteImageBtn">Delete Image</button>
            </div>
        </div>
    </div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/authen/auth.js"></script>
    <script src="../assets/api/ui.js"></script>
    <script>
        let allImages = [];
        let currentImageId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await loadImages();
            } catch (error) {
                console.error('Error:', error);
                showToast('Error loading images', 'error');
            }
        });

        async function loadImages() {
            try {
                showLoading(document.querySelector('.content-wrapper'));
                allImages = await fetchImages();

                document.getElementById('totalImages').textContent = allImages.length;
                renderImages();

                hideLoading(document.querySelector('.content-wrapper'));
            } catch (error) {
                console.error('Error:', error);
                hideLoading(document.querySelector('.content-wrapper'));
            }
        }

        function renderImages() {
            const grid = document.getElementById('imagesGrid');
            if (!grid) return;

            grid.innerHTML = '';

            if (allImages.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--color-text-secondary);">No images found</p>';
                return;
            }

            allImages.forEach(image => {
                const item = document.createElement('div');
                item.className = 'image-item';
                item.innerHTML = `
                    <div class="image-wrapper">
                        <img src="${image.image_url}" alt="Profile Image" onerror="this.src='https://via.placeholder.com/200?text=Error';">
                        <div class="image-overlay">
                            <button class="btn btn-sm" onclick="openImageModal('${image.id}', '${image.image_url}', '${image.user?.full_name || 'Unknown'}', '${image.user?.email || 'N/A'}', '${image.created_at}')">
                                <i data-feather="eye"></i> View
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="confirmDelete('${image.id}')">
                                <i data-feather="trash-2"></i> Delete
                            </button>
                        </div>
                    </div>
                    <div class="image-info">
                        <p class="image-user">${image.user?.full_name || 'Unknown'}</p>
                        <p class="image-date">${formatDate(image.created_at)}</p>
                    </div>
                `;
                grid.appendChild(item);
            });

            feather.replace();
        }

        function openImageModal(imageId, imageUrl, userName, userEmail, date) {
            currentImageId = imageId;
            document.getElementById('previewImage').src = imageUrl;
            document.getElementById('imageUser').textContent = userName;
            document.getElementById('imageEmail').textContent = userEmail;
            document.getElementById('imageDate').textContent = formatDateTime(date);

            const deleteBtn = document.getElementById('deleteImageBtn');
            deleteBtn.onclick = () => confirmDeleteFromModal(imageId);

            showModal('imageModal');
        }

        function confirmDelete(imageId) {
            showConfirmModal(
                'Delete Image',
                'Are you sure you want to delete this image?',
                async () => {
                    try {
                        showLoading(document.querySelector('.content-wrapper'));

                        const image = allImages.find(i => i.id === imageId);
                        await deleteImage(imageId, image?.image_url?.split('/').pop());

                        showToast('Image deleted successfully', 'success');
                        await loadImages();
                    } catch (error) {
                        console.error('Error:', error);
                        showToast('Error deleting image', 'error');
                    }
                }
            );
        }

        function confirmDeleteFromModal(imageId) {
            hideModal('imageModal');
            confirmDelete(imageId);
        }

        // Close modal buttons
        document.getElementById('closeImageModal').addEventListener('click', () => hideModal('imageModal'));
        document.getElementById('closeImageBtn').addEventListener('click', () => hideModal('imageModal'));
    </script>

    <style>
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            padding: 0;
        }

        .image-item {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-fast);
        }

        .image-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--color-primary);
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: var(--color-bg);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .image-item:hover .image-overlay {
            opacity: 1;
        }

        .image-info {
            padding: 1rem;
            background: var(--color-surface);
        }

        .image-user {
            font-weight: 600;
            color: var(--color-text);
            margin: 0 0 0.25rem 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .image-date {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            margin: 0;
        }

        @media (max-width: 768px) {
            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</body>

</html>
