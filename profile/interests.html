<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interests - MatriHub</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tabs {
            display: flex;
            gap: var(--spacing-lg);
            border-bottom: 2px solid var(--border-color);
            margin-bottom: var(--spacing-2xl);
        }

        .tab-btn {
            padding: var(--spacing-md) var(--spacing-lg);
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-light);
            transition: var(--transition);
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .interest-item {
            background: var(--bg-white);
            padding: var(--spacing-lg);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-lg);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .interest-item:hover {
            box-shadow: var(--shadow-md);
        }

        .interest-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }

        .interest-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-light);
            border: 3px solid var(--primary-color);
        }

        .interest-info {
            flex: 1;
        }

        .interest-name {
            font-size: var(--font-size-lg);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
        }

        .interest-details {
            display: flex;
            gap: var(--spacing-lg);
            font-size: var(--font-size-sm);
            color: var(--text-light);
        }

        .interest-message {
            background: var(--bg-light);
            padding: var(--spacing-lg);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-lg);
            border-left: 4px solid var(--primary-color);
            font-style: italic;
            color: var(--text-dark);
        }

        .interest-actions {
            display: flex;
            gap: var(--spacing-lg);
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: var(--spacing-2xl);
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 4rem;
            color: var(--text-lighter);
            margin-bottom: var(--spacing-lg);
        }

        .status-badge {
            display: inline-block;
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: rgba(255, 152, 0, 0.2);
            color: #e65100;
        }

        .status-accepted {
            background: rgba(76, 175, 80, 0.2);
            color: #2e7d32;
        }

        .status-rejected {
            background: rgba(244, 67, 54, 0.2);
            color: #c62828;
        }

        .interest-time {
            font-size: var(--font-size-xs);
            color: var(--text-lighter);
            margin-top: var(--spacing-md);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <i class="fas fa-heart" style="color: #f48fb1;"></i> Matri<span>Hub</span>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="navbar-nav" id="navbar-nav">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../browse.html">Browse Profiles</a></li>
            </ul>
            <div class="navbar-actions">
                <div id="user-menu" class="navbar-dropdown">
                    <button id="user-menu-toggle" class="navbar-user">
                        <img id="user-avatar" class="navbar-user-avatar" src="https://via.placeholder.com/40"
                            alt="User">
                        <span id="user-name">User</span>
                    </button>
                    <div class="navbar-dropdown-menu" id="dropdown-menu">
                        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
                        <a href="profile.html"><i class="fas fa-user"></i> My Profile</a>
                        <a href="interests.html"><i class="fas fa-heart"></i> Interests</a>
                        <a href="favorites.html"><i class="fas fa-star"></i> Favorites</a>
                        <hr
                            style="margin: var(--spacing-sm) 0; border: none; border-top: 1px solid var(--border-color);">
                        <a id="logout-btn" href="login.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Title -->
    <section
        style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; padding: var(--spacing-xl) 0; text-align: center;">
        <div class="container">
            <h1><i class="fas fa-heart"></i> Interest Requests</h1>
            <p>Manage your sent and received interest requests</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container" style="margin: var(--spacing-2xl) 0;">
        <div id="alerts-container"></div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0)">
                <i class="fas fa-inbox"></i> Received (<span id="received-count">0</span>)
            </button>
            <button class="tab-btn" onclick="switchTab(1)">
                <i class="fas fa-paper-plane"></i> Sent (<span id="sent-count">0</span>)
            </button>
        </div>

        <!-- Received Interests -->
        <div class="tab-content active" id="received-tab">
            <div id="received-interests-list"></div>
        </div>

        <!-- Sent Interests -->
        <div class="tab-content" id="sent-tab">
            <div id="sent-interests-list"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 MatriHub. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config/supabase.js"></script>
    <script src="../assets/js/userpanel/common.js"></script>
    <script>
        let currentUser = null;

        async function initInterestsPage() {
            currentUser = await checkAuthentication();
            if (!currentUser) return;

            await loadReceivedInterests();
            await loadSentInterests();
        }

        async function loadReceivedInterests() {
            showLoading('Loading interests...');
            const result = await getReceivedInterests(currentUser.id);
            hideLoading();

            const container = document.getElementById('received-interests-list');
            const countEl = document.getElementById('received-count');

            if (result.success && result.data.length > 0) {
                countEl.textContent = result.data.length;
                container.innerHTML = result.data
                    .map(interest => createInterestCard(interest, 'received'))
                    .join('');
            } else {
                countEl.textContent = '0';
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="fas fa-inbox"></i>
                        </div>
                        <h3>No Interests Yet</h3>
                        <p>When someone sends you an interest request, it will appear here.</p>
                        <a href="browse.html" class="btn btn-primary" style="margin-top: var(--spacing-lg);">
                            Browse Profiles
                        </a>
                    </div>
                `;
            }
        }

        async function loadSentInterests() {
            const result = await getSentInterests(currentUser.id);
            const container = document.getElementById('sent-interests-list');
            const countEl = document.getElementById('sent-count');

            if (result.success && result.data.length > 0) {
                countEl.textContent = result.data.length;
                container.innerHTML = result.data
                    .map(interest => createInterestCard(interest, 'sent'))
                    .join('');
            } else {
                countEl.textContent = '0';
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="fas fa-paper-plane"></i>
                        </div>
                        <h3>No Sent Interests</h3>
                        <p>Start sending interest requests to profiles you like.</p>
                        <a href="browse.html" class="btn btn-primary" style="margin-top: var(--spacing-lg);">
                            Browse Profiles
                        </a>
                    </div>
                `;
            }
        }

        function createInterestCard(interest, type) {
            const profile = type === 'received' ? interest.profiles : interest.profiles;
            const statusClass = `status-${interest.status.toLowerCase()}`;
            const timeStr = formatDate(interest.sent_at || interest.responded_at);

            return `
                <div class="interest-item">
                    <div class="interest-header">
                        <img class="interest-avatar" src="${profile.profile_image_url || 'https://via.placeholder.com/80'}" alt="${profile.full_name}">
                        <div class="interest-info">
                            <div class="interest-name">${profile.full_name}</div>
                            <div class="interest-details">
                                <span><i class="fas fa-birthday-cake"></i> ${profile.age} years</span>
                                <span><i class="fas fa-map-marker-alt"></i> ${profile.location || 'Not specified'}</span>
                                <span><i class="fas fa-briefcase"></i> ${profile.profession || 'Professional'}</span>
                            </div>
                        </div>
                        <span class="status-badge ${statusClass}">${interest.status}</span>
                    </div>

                    ${interest.message ? `
                        <div class="interest-message">
                            "${interest.message}"
                        </div>
                    ` : ''}

                    <div class="interest-actions">
                        <a href="profile-detail.html?id=${profile.id}" class="btn btn-secondary btn-small">
                            <i class="fas fa-eye"></i> View Profile
                        </a>
                        ${type === 'received' && interest.status === 'PENDING' ? `
                            <button class="btn btn-success btn-small" onclick="acceptInterestClick('${interest.id}')">
                                <i class="fas fa-check"></i> Accept
                            </button>
                            <button class="btn btn-outline btn-small" onclick="rejectInterestClick('${interest.id}')">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        ` : ''}
                    </div>

                    <div class="interest-time">
                        ${type === 'received' ? 'Sent' : 'Sent'} ${timeStr}
                    </div>
                </div>
            `;
        }

        async function acceptInterestClick(interestId) {
            showLoading('Accepting interest...');
            const result = await acceptInterest(interestId);
            hideLoading();

            if (result.success) {
                showToast('Interest accepted!', 'success');
                await loadReceivedInterests();
            } else {
                showAlert('Failed to accept interest', 'danger');
            }
        }

        async function rejectInterestClick(interestId) {
            showLoading('Rejecting interest...');
            const result = await rejectInterest(interestId);
            hideLoading();

            if (result.success) {
                showToast('Interest rejected', 'success');
                await loadReceivedInterests();
            } else {
                showAlert('Failed to reject interest', 'danger');
            }
        }

        function switchTab(tabIndex) {
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === tabIndex);
            });
            document.querySelectorAll('.tab-content').forEach((content, idx) => {
                content.classList.toggle('active', idx === tabIndex);
            });
        }

        document.addEventListener('DOMContentLoaded', initInterestsPage);
    </script>
</body>

</html>
