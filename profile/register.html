<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MatriHub</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 500px;
            margin: var(--spacing-2xl) auto;
            padding: var(--spacing-2xl);
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s ease-out;
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .auth-header h1 {
            font-size: var(--font-size-2xl);
            margin-bottom: var(--spacing-md);
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-link {
            text-align: center;
            margin-top: var(--spacing-lg);
        }

        .auth-link a {
            color: var(--primary-color);
            font-weight: 500;
        }

        .terms {
            font-size: var(--font-size-sm);
            text-align: center;
            color: var(--text-light);
            margin: var(--spacing-lg) 0;
        }

        .terms a {
            color: var(--primary-color);
        }
    </style>
</head>

<body style="background: linear-gradient(135deg, rgba(233, 30, 99, 0.05), rgba(33, 150, 243, 0.05));">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <i class="fas fa-heart" style="color: #f48fb1;"></i> Matri<span>Hub</span>
            </div>
            <ul class="navbar-nav">
                <li><a href="../index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Registration Form -->
    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Create Your Account</h1>
                <p>Join thousands finding their perfect match</p>
            </div>

            <div id="alerts-container"></div>

            <form id="register-form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
                    <small>Your name will be visible on your profile</small>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                    <small>We'll use this to verify your account</small>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" required
                        placeholder="Create a strong password">
                    <small>Minimum 6 characters required</small>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required
                        placeholder="Confirm your password">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-venus-mars"></i> Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select your gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-birthday-cake"></i> Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <div class="terms">
                    <label style="display: flex; align-items: center; gap: var(--spacing-sm); justify-content: center;">
                        <input type="checkbox" id="terms" name="terms" required>
                        I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-large"
                    style="width: 100%; margin-bottom: var(--spacing-lg);">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-link">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config/supabase.js"></script>
    <script src="../assets/js/userpanel/common.js"></script>
    <script>
    const registerForm = document.getElementById('register-form');
    const alertsContainer = document.getElementById('alerts-container');

    // Alert Function
    function showAlert(message, type = 'danger') {
        alertsContainer.innerHTML = `
            <div style="
                padding: 12px;
                margin-bottom: 15px;
                border-radius: 8px;
                color: white;
                background: ${type === 'success' ? '#4caf50' : '#f44336'};
            ">
                ${message}
            </div>
        `;
    }

    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const gender = document.getElementById('gender').value;
        const dob = document.getElementById('dob').value;

        // Validation
        if (!fullName || !email || !password || !confirmPassword || !gender || !dob) {
            showAlert('Please fill in all fields');
            return;
        }

        if (password !== confirmPassword) {
            showAlert('Passwords do not match');
            return;
        }

        if (password.length < 6) {
            showAlert('Password must be at least 6 characters');
            return;
        }

        try {

            // REGISTER USER
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password
            });

            if (error) {
                showAlert(error.message);
                return;
            }

            const user = data.user;

            // INSERT PROFILE DATA
            const { error: profileError } = await supabase
                .from('profiles')
                .insert([
                    {
                        id: user.id,
                        full_name: fullName,
                        gender: gender,
                        dob: dob,
                        email: email
                    }
                ]);

            if (profileError) {
                showAlert(profileError.message);
                return;
            }

            showAlert('Registration Successful!', 'success');

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);

        } catch (err) {
            showAlert(err.message);
        }
    });
</script>
</body>

</html>
